name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev
      - feature/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, Test, Build (Node 20)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Docker smoke test (adapter)
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
        run: npm run test:docker
