name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0
          submodules: recursive

      - name: Prepare release metadata
        id: metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="main-pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
            NAME="Main Merge #${{ github.event.pull_request.number }}"
            PRERELEASE=true
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="${GITHUB_REF_NAME}"
            if [[ "${GITHUB_REF_NAME}" == *"-"* ]]; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Package distribution
        run: |
          mkdir -p dist-release
          cp -r dist/* dist-release/
          cp package.json dist-release/
          cp package-lock.json dist-release/
          cp README.md dist-release/
          cp LICENSE dist-release/
          cp .env.example dist-release/
          cd dist-release
          npm ci --omit=dev
          cd ..
          tar -czf omnitools-mcp-server-${{ steps.metadata.outputs.tag }}.tar.gz -C dist-release .
          zip -r omnitools-mcp-server-${{ steps.metadata.outputs.tag }}.zip dist-release/

      - name: Extract release notes
        id: release_notes
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            # Extract version from semantic tag (e.g., v1.2.3 -> 1.2.3)
            VERSION=${GITHUB_REF_NAME#v}
            if [ -f CHANGELOG.md ]; then
              NOTES=$(awk "/## \[?${VERSION}\]?/,/## \[?[0-9]/" CHANGELOG.md | sed '1d;$d')
              if [ -z "$NOTES" ]; then
                NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
              fi
            else
              NOTES="Release ${VERSION}"
            fi
          else
            NOTES=$(cat <<EOF
Automated release for merged PR #${{ github.event.pull_request.number }} into main.

- PR: ${{ github.event.pull_request.html_url }}
- Merge commit: ${{ github.event.pull_request.merge_commit_sha }}
EOF
)
          fi
          
          # Save to file for GitHub release body
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.name }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          body_path: release_notes.md
          files: |
            omnitools-mcp-server-*.tar.gz
            omnitools-mcp-server-*.zip
          draft: false
          prerelease: ${{ steps.metadata.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force
