services:
  omni-tools-ui:
    image: iib0011/omni-tools:latest
    container_name: omni-tools-ui
    restart: unless-stopped
    ports:
      - "8080:80"

  it-tools-ui:
    image: ghcr.io/corentinth/it-tools:latest
    container_name: it-tools-ui
    restart: unless-stopped
    ports:
      - "8082:80"

  omni-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omni-adapter
    restart: unless-stopped
    command: ["node", "dist/adapter/index.js"]
    ports:
      - "8081:8081"
    environment:
      LOG_LEVEL: info
      LOG_FILE: logs/adapter.log
      ALLOWED_DIRECTORIES: /tmp
      OMNI_ADAPTER_HOST: 0.0.0.0
      OMNI_ADAPTER_PORT: 8081
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8081/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnitools-mcp-server
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    stdin_open: true
    tty: true
    environment:
      LOG_LEVEL: info
      LOG_FILE: logs/mcp-server.log
      ALLOWED_DIRECTORIES: /tmp
      OMNI_BACKEND: adapter
      OMNI_ADAPTER_URL: http://omni-adapter:8081
      IT_TOOLS_URL: http://it-tools-ui:80
      TOOL_TIMEOUT: 60
      SEARCH_RESULT_LIMIT: 10
    depends_on:
      omni-adapter:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
